name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from release
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download release tarball and compute sha256
        id: sha
        run: |
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -L "$TARBALL_URL" -o release.tar.gz
          SHA=$(shasum -a 256 release.tar.gz | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: phuongddx/homebrew-spm-cache
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.sha.outputs.SHA256 }}"
          FORMULA="tap/Formula/spm-cache.rb"

          sed -i "s|url \".*archive/refs/tags/.*\\.tar\\.gz\"|url \"https://github.com/phuongddx/spm-cache/archive/refs/tags/v${VERSION}.tar.gz\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FORMULA"
          sed -i "s|version \".*\"|version \"${VERSION}\"|" "$FORMULA"

          cat "$FORMULA"

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spm-cache.rb
          git commit -m "chore: update spm-cache to ${{ steps.version.outputs.VERSION }}" || exit 0
          git push
